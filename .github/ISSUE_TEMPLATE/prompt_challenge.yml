name: Prompt Challenge Report
description: Share a coding task where you couldn't get the AI to produce what you needed. We'll find the working approach together and publish both sessions side-by-side as an educational case study.
title: "[Challenge]: "
labels: ["prompt-challenge"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing! This template feeds directly into the AI Playground
        [challenge pipeline](https://github.com/raven2cz/ai/blob/main/AGENTS.md).
        Each field maps to a file in `data/challenges/<slug>/`, so the more
        concrete you are, the faster we can turn this into a published case.

        Please fill in **all required fields**. Issues missing the failed
        session or the broken output usually can't be reproduced and will be
        closed.

  - type: input
    id: short-title
    attributes:
      label: "Short title"
      description: "One line — the problem in a nutshell. Becomes the challenge page title."
      placeholder: "e.g. Center a div without breaking mobile layout"
    validations:
      required: true

  - type: textarea
    id: problem-description
    attributes:
      label: "What were you trying to do?"
      description: |
        Describe the task in plain language. What were you building?
        What's the context (framework, language, file you were editing)?
      placeholder: |
        I was building a landing page in plain HTML/CSS. I needed the hero
        section's CTA button centered both horizontally and vertically inside
        a full-viewport container, with the layout still working on mobile.
    validations:
      required: true

  - type: textarea
    id: expected-result
    attributes:
      label: "Expected result"
      description: "What should the correct code produce or how should it behave?"
      placeholder: |
        - Button visually centered in the viewport on desktop and mobile.
        - No horizontal scroll on 320px-wide screens.
        - Works without JavaScript.
    validations:
      required: true

  - type: textarea
    id: constraints
    attributes:
      label: "Constraints (optional)"
      description: "Anything the AI must respect: language, framework, forbidden APIs, performance budgets, accessibility."
      placeholder: |
        - Plain HTML + CSS, no frameworks.
        - Must be semantic (<main>, <button>, not <div>).
        - Respect prefers-reduced-motion.
    validations:
      required: false

  - type: textarea
    id: failed-session
    attributes:
      label: "Failed conversation (session-user)"
      description: |
        Paste the full chat that went wrong. Either a shared link (ChatGPT/Claude/Gemini) **or** the Markdown transcript.
        If you paste the transcript, please alternate speakers like this so we can render it as chat bubbles:

        ```
        **User:**
        <your prompt>

        **Assistant:**
        <AI reply>
        ```
      render: markdown
    validations:
      required: true

  - type: textarea
    id: current-output
    attributes:
      label: "Broken output (solution-user)"
      description: |
        Paste the exact code you ended up with — the one that doesn't work.
        If it's more than one file, use multiple fenced blocks and label each with its filename, e.g.:

        ````
        ```html
        <!-- index.html -->
        …
        ```
        ```css
        /* style.css */
        …
        ```
        ````
      render: markdown
    validations:
      required: true

  - type: textarea
    id: what-breaks
    attributes:
      label: "What actually happens?"
      description: "Describe the observed failure: visual glitch, error message, wrong output, etc. Screenshots welcome."
      placeholder: |
        The button sits top-left instead of centered. On mobile (<400px) the
        container overflows and creates horizontal scroll.
    validations:
      required: true

  - type: input
    id: tags
    attributes:
      label: "Tags (optional)"
      description: "Comma-separated tech tags used on the challenge card."
      placeholder: "HTML, CSS, Layout"
    validations:
      required: false

  - type: checkboxes
    id: consent
    attributes:
      label: "Consent"
      description: "Challenges are published publicly on the AI Playground site."
      options:
        - label: "I agree to this conversation and code being republished as an educational case study."
          required: true
