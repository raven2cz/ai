<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Analog Clock</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, #f5f5f5, #dcdcdc);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .clock-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .clock {
      position: relative;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      border: 10px solid #000000;
      background: #ffffff;
      box-shadow:
        0 8px 20px rgba(0, 0, 0, 0.4),
        inset 0 0 10px rgba(0, 0, 0, 0.1);
    }

    /* Inner ring */
    .clock::before {
      content: "";
      position: absolute;
      inset: 12px;
      border-radius: 50%;
      border: 1px solid rgba(0, 0, 0, 0.1);
    }

    /* Hour marks – now geometrically centered and symmetric */
    .hour-mark {
      position: absolute;
      width: 4px;
      height: 14px;
      background: #000000;
      border-radius: 2px;
      transform-origin: 50% 50%;
    }

    .hour-number {
      position: absolute;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 600;
      color: #000000;
      user-select: none;
      pointer-events: none;
    }

    .clock-center {
      position: absolute;
      width: 14px;
      height: 14px;
      background: #000000;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 4px rgba(0, 0, 0, 0.6);
    }

    .hand {
      position: absolute;
      width: 4px;
      height: 40%;
      background: #000000;
      top: 10%;
      left: 50%;
      transform-origin: 50% 100%;
      transform: translateX(-50%) rotate(0deg);
      border-radius: 2px;
      box-shadow: 0 0 3px rgba(0, 0, 0, 0.4);
    }

    .hand.hour {
      height: 28%;
      top: 22%;
      width: 6px;
    }

    .hand.minute {
      height: 38%;
      top: 12%;
      width: 4px;
    }

    .hand.second {
      height: 42%;
      top: 8%;
      width: 2px;
      background: #c60000;
      box-shadow: 0 0 4px rgba(198, 0, 0, 0.8);
    }

    .second-counterweight {
      position: absolute;
      width: 2px;
      height: 14%;
      background: #c60000;
      bottom: 50%;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <div class="clock-wrapper">
    <div class="clock" id="clock">
      <!-- Hour marks & numbers will be injected by JS -->
      <div class="hand hour" id="hour-hand"></div>
      <div class="hand minute" id="minute-hand"></div>
      <div class="hand second" id="second-hand">
        <div class="second-counterweight"></div>
      </div>
      <div class="clock-center"></div>
    </div>
  </div>

  <script>
    /** @type {number} */
    const HOUR_MARK_HEIGHT = 14;
    /** @type {number} */
    const HOUR_MARK_WIDTH = 4;

    /**
     * Creates hour marks (ticks) and hour numbers (1–12) around the clock face.
     * Marks and numbers are mathematically aligned so that 12/3/6/9 (a ostatní)
     * přesně sedí k okraji a ke středu.
     *
     * @param {HTMLElement} clockElement - The root clock element.
     * @returns {void}
     */
    function createHourMarksAndNumbers(clockElement) {
      const clockSize = clockElement.clientWidth; // inner width (without border)
      const center = clockSize / 2;

      // Distance of hour mark centers from clock center
      // This is chosen so that the marks are symmetrically offset od vnitřního okraje.
      const markRadius = center - 11; // 150 - 11 = 139 for size 300

      // Numbers are slightly blíž ke středu než čárky
      const numberRadius = markRadius - 24;

      for (let i = 0; i < 12; i += 1) {
        const angleDeg = i * 30; // 360 / 12
        const angleRad = (Math.PI / 6) * i; // stejný úhel v radiánech

        // --- Create hour mark (tick) ---
        const mark = document.createElement("div");
        mark.className = "hour-mark";

        // Polar → Cartesian, using 12 o'clock as angle 0
        const markCenterX = center + markRadius * Math.sin(angleRad);
        const markCenterY = center - markRadius * Math.cos(angleRad);

        // Position mark so that its center is on the circle
        mark.style.left = `${markCenterX - HOUR_MARK_WIDTH / 2}px`;
        mark.style.top = `${markCenterY - HOUR_MARK_HEIGHT / 2}px`;

        // Rotate to align the mark radially
        mark.style.transform = `rotate(${angleDeg}deg)`;

        clockElement.appendChild(mark);

        // --- Create hour number (1–12) ---
        const number = document.createElement("div");
        number.className = "hour-number";

        const numberValue = i === 0 ? 12 : i; // 12 at the top, then 1..11

        const numberCenterX = center + numberRadius * Math.sin(angleRad);
        const numberCenterY = center - numberRadius * Math.cos(angleRad);

        number.style.left = `${numberCenterX - 14}px`; // 28px / 2
        number.style.top = `${numberCenterY - 14}px`;  // 28px / 2
        number.textContent = String(numberValue);

        clockElement.appendChild(number);
      }
    }

    /**
     * Updates the rotation of the clock hands based on current time.
     * Uses a smooth, continuous movement for all hands.
     *
     * @param {HTMLElement} hourHand - DOM element for the hour hand.
     * @param {HTMLElement} minuteHand - DOM element for the minute hand.
     * @param {HTMLElement} secondHand - DOM element for the second hand.
     * @returns {void}
     */
    function updateClockHands(hourHand, minuteHand, secondHand) {
      const now = new Date();

      const milliseconds = now.getMilliseconds();
      const seconds = now.getSeconds() + milliseconds / 1000;
      const minutes = now.getMinutes() + seconds / 60;
      const hours = (now.getHours() % 12) + minutes / 60;

      const secondDegrees = seconds * 6; // 360 / 60
      const minuteDegrees = minutes * 6;
      const hourDegrees = hours * 30; // 360 / 12

      hourHand.style.transform = `translateX(-50%) rotate(${hourDegrees}deg)`;
      minuteHand.style.transform = `translateX(-50%) rotate(${minuteDegrees}deg)`;
      secondHand.style.transform = `translateX(-50%) rotate(${secondDegrees}deg)`;
    }

    /**
     * Starts the animation loop for the analog clock using requestAnimationFrame.
     * @returns {void}
     */
    function startClock() {
      const clockElement = document.getElementById("clock");
      const hourHand = document.getElementById("hour-hand");
      const minuteHand = document.getElementById("minute-hand");
      const secondHand = document.getElementById("second-hand");

      if (!clockElement || !hourHand || !minuteHand || !secondHand) {
        // Basic guard in case DOM elements are missing.
        console.error("Clock elements not found in DOM.");
        return;
      }

      // Create the hour ticks and numbers once.
      createHourMarksAndNumbers(clockElement);

      /**
       * Animation loop callback.
       * @returns {void}
       */
      function tick() {
        updateClockHands(hourHand, minuteHand, secondHand);
        window.requestAnimationFrame(tick);
      }

      window.requestAnimationFrame(tick);
    }

    // Initialize the clock when the DOM is fully loaded.
    window.addEventListener("DOMContentLoaded", startClock);
  </script>
</body>
</html>
