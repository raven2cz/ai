<!DOCTYPE html>
<html>
<head>
    <style>
        body { 
            background: #0f172a; 
            margin: 0; 
            height: 100vh;
            display: grid;
            place-items: center;
            font-family: system-ui;
        }
        .card {
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            color: white;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 1px solid #334155;
        }
        h2 { margin: 0 0 10px 0; color: #38bdf8; }
        p { margin: 0; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Ahoj světe</h2>
        <p>Precizně vycentrováno díky CSS Grid.</p>
    </div>
</body>
</html>
