<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Working solution — CSS Grid centering</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --border: #334155;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; }
        body {
            background: radial-gradient(circle at 30% 20%, #1e293b, var(--bg) 70%);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: var(--text);
            display: grid;
            place-items: center;
            padding: 24px;
        }
        .card {
            width: min(420px, 100%);
            background: var(--card);
            padding: 40px 36px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid var(--border);
            box-shadow:
                0 1px 2px rgba(0, 0, 0, 0.4),
                0 24px 60px -12px rgba(56, 189, 248, 0.18);
        }
        .card h2 {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--accent);
            margin-bottom: 10px;
        }
        .card p {
            color: var(--muted);
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <main class="card">
        <h2>Hello world</h2>
        <p>Precisely centered with CSS Grid — horizontally and vertically, at any viewport size.</p>
    </main>
</body>
</html>
